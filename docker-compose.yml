services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api
        VITE_MODEL_PROVIDER_LABEL: Gemini
    ports:
      - "3000:80"
    depends_on:
      - backend
